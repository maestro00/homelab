image:
  repository: binwiederhier/ntfy
  tag: "v2.14.0"

service:
  type: ClusterIP
  port: 80

persistence:
  storageClass: longhorn
  size: 2Gi

config:
  baseURL: https://ntfy.yukselcloud.com
  authDefaultAccess: deny-all
  behindProxy: true
  logLevel: info
  enableLogin: true
  upstreamBaseURL: https://ntfy.sh

auth:
  existingSecret: ntfy-auth
