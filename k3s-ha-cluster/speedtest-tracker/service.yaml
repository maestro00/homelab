---
apiVersion: v1
kind: Service
metadata:
  name: speedtest-tracker
  namespace: speedtest-tracker
  labels:
    app: speedtest-tracker
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.0.223
  selector:
    app: speedtest-tracker
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
