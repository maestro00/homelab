name: Deploy Homer Config
on:
  push:
    paths:
      - "k3s-ha-cluster/homer/config.yaml"

jobs:
  deploy-homer-config:
    runs-on: self-hosted

    container:
      image: git.yukselcloud.com/lab/kubectl-node:latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DEPLOY }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply Homer ConfigMap
        run: |
          kubectl -n homer create configmap homer-config \
            --from-file=config.yml=k3s-ha-cluster/homer/config.yaml \
            -o yaml --dry-run=client | kubectl apply -f -

      - name: Rollout Restart Homer
        run: kubectl -n homer rollout restart deploy homer

      - name: Notify
        if: always()
        run: |
          STATUS="${{ job.status }}"
          PRIORITY=$([[ "$STATUS" == "success" ]] && echo "default" || echo "high")
          TAGS=$([[ "$STATUS" == "success" ]] && echo "white_check_mark" || echo "warning")
          curl -sf \
            -H "Title: homer deploy: $STATUS" \
            -H "Priority: $PRIORITY" \
            -H "Tags: $TAGS" \
            -H "Authorization: Bearer ${{ secrets.NTFY_TOKEN }}" \
            -d "Homer config applied and rollout restarted — $STATUS" \
            https://ntfy.yukselcloud.com/homelab-deploys
